# Schema: registry-entry-v1
# Source: Kognis Registry (kognis-registry repo)
# Version: 1
# Description: Schema for plugin registry entries (marketplace metadata)

api_version: 1
description: "Schema for plugin registry entries (marketplace metadata)"
schema_name: registry_entry
schema_version: 1

fields:
  # Identity
  plugin_id:
    type: string
    required: true
    description: "Unique plugin identifier"
    example: "com.kognis.prajna"

  name:
    type: string
    required: true
    description: "Human-readable plugin name"
    example: "Prajna"

  version:
    type: string
    required: true
    description: "Semantic version"
    example: "0.1.0"

  author:
    type: string
    required: true
    description: "Author/maintainer"

  description:
    type: string
    required: true
    description: "Brief description"

  # Source
  repository:
    type: string
    required: true
    description: "Repository URL"
    example: "https://github.com/kognis-framework/kognis-prajna"

  license:
    type: string
    required: true
    description: "SPDX license identifier"
    example: "MIT"

  # Verification
  verified:
    type: boolean
    required: true
    description: "Whether this is an officially maintained plugin"
    default: false

  # Capabilities and pipelines
  capabilities:
    type: array
    required: true
    description: "List of capability IDs this plugin provides"
    items: string

  pipelines:
    type: array
    required: true
    description: "List of pipeline IDs this plugin registers for"
    items: string

  # Compatibility
  min_framework_version:
    type: string
    required: true
    description: "Minimum Kognis Framework version required"
    example: "0.1.0"

  # Categorization
  tags:
    type: array
    required: false
    description: "Search/discovery tags"
    items: string
    examples: ["official", "core", "cognitive", "memory", "community"]